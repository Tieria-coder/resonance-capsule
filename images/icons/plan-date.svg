<!-- 图标 · 计划页 · 填充图标 · 24×24 -->
<!-- 灰色 #999999 · 日期（剩余天数） -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- 日历主体 -->
  <rect x="2" y="5" width="20" height="17" rx="3" fill="#999999"/>
  <!-- 顶部深色条 -->
  <rect x="2" y="5" width="20" height="6" rx="3" fill="#777777"/>
  <rect x="2" y="5" width="20" height="3" fill="#777777"/>
  <!-- 挂环左 -->
  <rect x="6.5" y="2" width="2.4" height="6" rx="1.2" fill="#777777"/>
  <!-- 挂环右 -->
  <rect x="15.1" y="2" width="2.4" height="6" rx="1.2" fill="#777777"/>
  <!-- 日期文字（简化） -->
  <text x="12" y="18.5" text-anchor="middle" font-size="7" font-weight="bold" fill="white" font-family="sans-serif">31</text>
</svg>
