<!-- AI陪伴 · 填充图标 · 32×32 -->
<!-- 靛蓝色 #7B8FBA · 带呼吸灯 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 圆角方形头部（机器人脸） -->
  <rect x="7" y="6" width="18" height="16" rx="5" fill="#7B8FBA"/>
  <!-- 眼睛 — 两只圆眼 -->
  <circle cx="12.5" cy="13" r="2" fill="white"/>
  <circle cx="19.5" cy="13" r="2" fill="white"/>
  <!-- 微笑嘴 -->
  <path d="M12.5 17 Q16 20 19.5 17" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 天线杆 -->
  <line x1="16" y1="6" x2="16" y2="2" stroke="#7B8FBA" stroke-width="2" stroke-linecap="round"/>
  <!-- 天线球 · 呼吸灯 -->
  <circle cx="16" cy="1.5" r="2" fill="#A8B5D4">
    <animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
